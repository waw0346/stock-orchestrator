<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 포트폴리오 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f0f6fc;
    }
    .subtitle {
      font-size: 13px;
      color: #7d8590;
      margin-bottom: 24px;
    }
    .kpi-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .kpi {
      flex: 1;
      min-width: 130px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 18px;
    }
    .kpi-label { font-size: 12px; color: #7d8590; margin-bottom: 6px; }
    .kpi-value { font-size: 26px; font-weight: 700; }
    .kpi-value.green { color: #3fb950; }
    .kpi-value.red { color: #f85149; }
    .kpi-value.yellow { color: #d29922; }
    .kpi-value.blue { color: #58a6ff; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .grid-full { grid-column: 1 / -1; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .chart-wrap { position: relative; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #30363d;
      color: #7d8590;
      font-weight: 500;
    }
    td {
      padding: 9px 10px;
      border-bottom: 1px solid #21262d;
    }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active { background: #1f3a1f; color: #3fb950; border: 1px solid #2d5a2d; }
    .badge-watch { background: #3b2f0f; color: #d29922; border: 1px solid #5a4a1a; }
    .badge-closed { background: #2a1b1b; color: #f85149; border: 1px solid #4a2a2a; }
    .ret-pos { color: #3fb950; font-weight: 600; }
    .ret-neg { color: #f85149; font-weight: 600; }
    .ret-na { color: #7d8590; }
    footer {
      margin-top: 20px;
      font-size: 11px;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>📊 포트폴리오 대시보드</h1>
<p class="subtitle">기준일: 2026-05-25 &nbsp;|&nbsp; 데이터 출처: picks/INDEX.md</p>

<div class="kpi-row">
  <div class="kpi">
    <div class="kpi-label">총 픽 수</div>
    <div class="kpi-value blue">9</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Active</div>
    <div class="kpi-value green">2</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Watch</div>
    <div class="kpi-value yellow">5</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Closed</div>
    <div class="kpi-value red">2</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">평균 수익률 (수익률 있는 픽)</div>
    <div class="kpi-value" id="avg-ret">-</div>
  </div>
</div>

<div class="grid">

  <!-- 수익률 바차트 -->
  <div class="card grid-full">
    <h2>포지션별 수익률</h2>
    <div class="chart-wrap" style="height:280px">
      <canvas id="returnChart"></canvas>
    </div>
  </div>

  <!-- 상태 도넛 -->
  <div class="card">
    <h2>포트폴리오 상태 분포</h2>
    <div class="chart-wrap" style="height:240px">
      <canvas id="statusChart"></canvas>
    </div>
  </div>

  <!-- 별점 분포 -->
  <div class="card">
    <h2>별점(등급) 분포</h2>
    <div class="chart-wrap" style="height:240px">
      <canvas id="ratingChart"></canvas>
    </div>
  </div>

  <!-- 상세 테이블 -->
  <div class="card grid-full">
    <h2>픽 상세 목록</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>발행일</th>
            <th>종목코드</th>
            <th>종목명</th>
            <th>등급</th>
            <th>수익률</th>
            <th>상태</th>
            <th>최종점검</th>
          </tr>
        </thead>
        <tbody id="pick-table"></tbody>
      </table>
    </div>
  </div>

</div>

<footer>본 대시보드는 공개 데이터 기반 리서치 목적이며, 투자 권유가 아닙니다.</footer>

<script>
const picks = [
  { date:'2026-05-11', code:'000660', name:'SK하이닉스',      rating:4, ret:13.6,  status:'active',  review:'2026-05-22' },
  { date:'2026-05-11', code:'011790', name:'SKC',             rating:2, ret:-13.0, status:'watch',   review:'2026-05-22' },
  { date:'2026-05-12', code:'454910', name:'두산로보틱스',    rating:2, ret:4.8,   status:'watch',   review:'2026-05-22' },
  { date:'2026-05-14', code:'329180', name:'HD현대중공업',    rating:3, ret:-17.2, status:'closed',  review:'2026-05-21' },
  { date:'2026-05-14', code:'046890', name:'서울반도체',      rating:2, ret:null,  status:'watch',   review:'2026-05-19' },
  { date:'2026-05-15', code:'066570', name:'LG전자',          rating:3, ret:-8.0,  status:'watch',   review:'2026-05-19' },
  { date:'2026-05-18', code:'006800', name:'미래에셋증권',    rating:3, ret:-1.7,  status:'active',  review:'2026-05-22' },
  { date:'2026-05-19', code:'207940', name:'삼성바이오로직스',rating:3, ret:8.2,   status:'watch',   review:'2026-05-19' },
  { date:'2026-05-11', code:'005930', name:'삼성전자',        rating:3, ret:3.3,   status:'closed',  review:'2026-05-22' },
];

// KPI avg return
const withRet = picks.filter(p => p.ret !== null);
const avg = withRet.reduce((s,p) => s + p.ret, 0) / withRet.length;
const el = document.getElementById('avg-ret');
el.textContent = (avg >= 0 ? '+' : '') + avg.toFixed(1) + '%';
el.className = 'kpi-value ' + (avg >= 0 ? 'green' : 'red');

// 테이블
const tbody = document.getElementById('pick-table');
picks.forEach(p => {
  const retStr = p.ret === null ? '-' : (p.ret >= 0 ? '+' : '') + p.ret + '%';
  const retClass = p.ret === null ? 'ret-na' : (p.ret >= 0 ? 'ret-pos' : 'ret-neg');
  const stars = '⭐'.repeat(p.rating);
  const badgeClass = p.status === 'active' ? 'badge-active' : p.status === 'watch' ? 'badge-watch' : 'badge-closed';
  const badgeLabel = p.status === 'active' ? '🟢 Active' : p.status === 'watch' ? '🟡 Watch' : '🔴 Closed';
  tbody.innerHTML += `<tr>
    <td>${p.date}</td>
    <td style="font-family:monospace;color:#58a6ff">${p.code}</td>
    <td>${p.name}</td>
    <td>${stars}</td>
    <td class="${retClass}">${retStr}</td>
    <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
    <td style="color:#7d8590">${p.review}</td>
  </tr>`;
});

// 수익률 바차트
const sorted = [...picks].filter(p => p.ret !== null).sort((a,b) => b.ret - a.ret);
new Chart(document.getElementById('returnChart'), {
  type: 'bar',
  data: {
    labels: sorted.map(p => p.name),
    datasets: [{
      label: '수익률 (%)',
      data: sorted.map(p => p.ret),
      backgroundColor: sorted.map(p =>
        p.ret > 0 ? 'rgba(63,185,80,0.75)' : 'rgba(248,81,73,0.75)'
      ),
      borderColor: sorted.map(p =>
        p.ret > 0 ? '#3fb950' : '#f85149'
      ),
      borderWidth: 1,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw + '%'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#8b949e', font: { size: 12 } },
        grid: { color: '#21262d' }
      },
      y: {
        ticks: {
          color: '#8b949e',
          callback: v => (v >= 0 ? '+' : '') + v + '%'
        },
        grid: { color: '#21262d' },
        border: { dash: [4,4] }
      }
    }
  }
});

// 상태 도넛
const statusCounts = { active: 0, watch: 0, closed: 0 };
picks.forEach(p => statusCounts[p.status]++);
new Chart(document.getElementById('statusChart'), {
  type: 'doughnut',
  data: {
    labels: ['🟢 Active', '🟡 Watch', '🔴 Closed'],
    datasets: [{
      data: [statusCounts.active, statusCounts.watch, statusCounts.closed],
      backgroundColor: ['rgba(63,185,80,0.8)','rgba(210,153,34,0.8)','rgba(248,81,73,0.8)'],
      borderColor: ['#3fb950','#d29922','#f85149'],
      borderWidth: 2,
      hoverOffset: 8
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '62%',
    plugins: {
      legend: {
        position: 'bottom',
        labels: { color: '#8b949e', padding: 16, font: { size: 12 } }
      }
    }
  }
});

// 별점 분포
const ratingMap = { 2: { count:0, retSum:0, retN:0 }, 3: { count:0, retSum:0, retN:0 }, 4: { count:0, retSum:0, retN:0 } };
picks.forEach(p => {
  if (ratingMap[p.rating]) {
    ratingMap[p.rating].count++;
    if (p.ret !== null) { ratingMap[p.rating].retSum += p.ret; ratingMap[p.rating].retN++; }
  }
});
new Chart(document.getElementById('ratingChart'), {
  type: 'bar',
  data: {
    labels: ['⭐⭐ (2점)', '⭐⭐⭐ (3점)', '⭐⭐⭐⭐ (4점)'],
    datasets: [
      {
        label: '픽 수',
        data: [ratingMap[2].count, ratingMap[3].count, ratingMap[4].count],
        backgroundColor: ['rgba(88,166,255,0.7)','rgba(88,166,255,0.7)','rgba(88,166,255,0.7)'],
        borderColor: '#58a6ff',
        borderWidth: 1,
        borderRadius: 4,
        yAxisID: 'y',
      },
      {
        label: '평균 수익률 (%)',
        type: 'line',
        data: [
          ratingMap[2].retN ? +(ratingMap[2].retSum/ratingMap[2].retN).toFixed(1) : null,
          ratingMap[3].retN ? +(ratingMap[3].retSum/ratingMap[3].retN).toFixed(1) : null,
          ratingMap[4].retN ? +(ratingMap[4].retSum/ratingMap[4].retN).toFixed(1) : null,
        ],
        borderColor: '#3fb950',
        backgroundColor: 'rgba(63,185,80,0.15)',
        pointBackgroundColor: '#3fb950',
        tension: 0.3,
        yAxisID: 'y2',
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: { color: '#8b949e', font: { size: 11 } }
      }
    },
    scales: {
      x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
      y: {
        type: 'linear', position: 'left',
        ticks: { color: '#8b949e', stepSize: 1 },
        grid: { color: '#21262d' },
        title: { display: true, text: '픽 수', color: '#7d8590' }
      },
      y2: {
        type: 'linear', position: 'right',
        ticks: { color: '#3fb950', callback: v => (v>=0?'+':'')+v+'%' },
        grid: { drawOnChartArea: false },
        title: { display: true, text: '평균 수익률', color: '#3fb950' }
      }
    }
  }
});
</script>
</body>
</html>
