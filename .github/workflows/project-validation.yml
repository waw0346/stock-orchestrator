name: Project validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run project validation suite
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\run_all_tests.ps1
